<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Yanto Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #17212b;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #17212b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .header {
            background: #17212b;
            padding: 12px 16px;
            border-bottom: 1px solid #2b3b4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 600;
        }
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        .add-btn, .logout-btn {
            background: #6ab04c;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-btn {
            background: #dc2626;
            font-size: 0.9rem;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #2b3b4a;
            cursor: pointer;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-right: 12px;
        }
        .chat-info {
            flex: 1;
        }
        .chat-name {
            font-weight: 600;
            color: #fff;
        }
        .chat-preview {
            font-size: 0.8rem;
            color: #8b9bb0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-detail {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .chat-detail-header {
            background: #17212b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2b3b4a;
        }
        .back-btn {
            background: none;
            border: none;
            color: #6ab04c;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .message.outgoing {
            background: #2b5270;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.incoming {
            background: #1e2a36;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message .sender {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .input-area {
            background: #17212b;
            padding: 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #2b3b4a;
            position: relative;
            flex-wrap: wrap;
        }
        .input-row {
            display: flex;
            gap: 8px;
            flex: 1;
        }
        .input-area input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: #2b3b4a;
            color: white;
            font-size: 0.9rem;
        }
        .input-area input:focus {
            outline: none;
        }
        .input-area button {
            background: #6ab04c;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
        .emoji-btn {
            background: #2b3b4a;
            border: none;
            width: 40px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .emoji-panel {
            display: none;
            background: #1e2a36;
            border-radius: 16px;
            padding: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            border: 1px solid #2b3b4a;
        }
        .emoji-panel span {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .emoji-panel span:hover {
            background: #2b3b4a;
        }
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
        }
        .auth-card {
            background: #242f3e;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
        }
        .auth-card h2 {
            color: white;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }
        .auth-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            background: #1e2a36;
            color: white;
            font-size: 0.9rem;
        }
        .auth-card input:focus {
            outline: none;
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            background: #6ab04c;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
        .switch {
            text-align: center;
            margin-top: 12px;
            color: #6ab04c;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #242f3e;
            border-radius: 16px;
            padding: 24px;
            width: 80%;
            max-width: 300px;
        }
        .modal-content h3 {
            color: white;
            margin-bottom: 12px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            background: #1e2a36;
            color: white;
        }
        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #6ab04c;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .close-modal {
            background: #dc2626;
            margin-top: 8px;
        }
        .hide { display: none; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div id="authView" class="auth-container">
        <div class="auth-card">
            <h2>Yanto Chat</h2>
            <input type="text" id="authUsername" placeholder="Username">
            <input type="password" id="authPassword" placeholder="Password">
            <button id="authBtn">Login</button>
            <div class="switch" id="switchAuth">Register</div>
        </div>
    </div>
    <div id="mainView" class="hide">
        <div id="chatListView" style="display:flex; flex-direction:column; height:100%;">
            <div class="header">
                <h1>Yanto Chat</h1>
                <div class="header-buttons">
                    <button class="add-btn" onclick="showSearchModal()">+</button>
                    <button class="logout-btn" onclick="logout()">🚪</button>
                </div>
            </div>
            <div id="chatList" class="chat-list"></div>
        </div>
        <div id="chatDetailView" class="chat-detail">
            <div class="chat-detail-header">
                <button class="back-btn" onclick="backToList()">←</button>
                <div><span style="font-weight:600; color:white;" id="detailUsername"></span></div>
            </div>
            <div id="messagesArea" class="messages-area"></div>
            <div class="input-area">
                <div class="input-row">
                    <button class="emoji-btn" id="emojiBtn">😊</button>
                    <input type="text" id="messageInput" placeholder="Ketik pesan...">
                    <button onclick="sendMsg()">Kirim</button>
                </div>
                <div id="emojiPanel" class="emoji-panel">
                    <span>😀</span> <span>😂</span> <span>😍</span> <span>🥰</span> <span>😎</span>
                    <span>😭</span> <span>😡</span> <span>👍</span> <span>🙏</span> <span>🔥</span>
                    <span>💀</span> <span>😹</span> <span>🗿</span> <span>😈</span> <span>👹</span>
                    <span>🤡</span> <span>🥶</span> <span>🥵</span> <span>✨</span> <span>🎉</span>
                    <span>❤️</span> <span>💔</span> <span>💯</span> <span>😱</span> <span>🤔</span>
                    <span>😴</span> <span>🤤</span> <span>🥴</span> <span>🫡</span> <span>🤝</span>
                    <span>👊</span> <span>💪</span> <span>👀</span> <span>💩</span> <span>✨</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Konfigurasi
    const BOT1_TOKEN = '8606015215:AAF0ECEhBqchYwOlgGuwRQD9ggJvhKVYszU';
    const BOT2_TOKEN = '8696412856:AAFHHyzynN0k_hCNj8F4mR8QBfbNPFxiUDk';
    const CHAT_ID = '-1002806265297';
    
    let currentUser = null;
    let currentChatWith = null;
    let allMessages = [];
    let users = [];
    
    // Emoji Panel
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPanel = document.getElementById('emojiPanel');
    const messageInput = document.getElementById('messageInput');
    
    emojiBtn.addEventListener('click', () => {
        if (emojiPanel.style.display === 'flex') {
            emojiPanel.style.display = 'none';
        } else {
            emojiPanel.style.display = 'flex';
        }
    });
    
    document.querySelectorAll('.emoji-panel span').forEach(emoji => {
        emoji.addEventListener('click', () => {
            messageInput.value += emoji.textContent;
            messageInput.focus();
        });
    });
    
    function logout() {
        localStorage.removeItem('yanto_user');
        currentUser = null;
        currentChatWith = null;
        document.getElementById('mainView').classList.add('hide');
        document.getElementById('authView').classList.remove('hide');
        document.getElementById('authUsername').value = '';
        document.getElementById('authPassword').value = '';
        document.getElementById('authBtn').innerText = 'Login';
        document.getElementById('switchAuth').innerText = 'Register';
    }
    
    function checkSession() {
        const savedUser = localStorage.getItem('yanto_user');
        if (savedUser) {
            currentUser = savedUser;
            document.getElementById('authView').classList.add('hide');
            document.getElementById('mainView').classList.remove('hide');
            loadMessages();
            setInterval(loadMessages, 3000);
        }
    }
    
    async function loadUsersFromTelegram() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT2_TOKEN}/getUpdates?limit=200`);
            const data = await res.json();
            if (data.ok) {
                const userMap = new Map();
                for (const update of data.result) {
                    const msg = update.message;
                    if (msg && msg.text && msg.text.startsWith('REGISTER:')) {
                        const parts = msg.text.replace('REGISTER:', '').trim().split(':');
                        if (parts.length >= 2) {
                            userMap.set(parts[0], parts[1]);
                        }
                    }
                }
                users = Array.from(userMap.entries()).map(([u, p]) => ({ username: u, password: p }));
            }
        } catch(e) { console.error(e); }
    }
    
    async function registerToTelegram(username, password) {
        const text = `REGISTER:${username}:${password}`;
        await fetch(`https://api.telegram.org/bot${BOT1_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text })
        });
    }
    
    document.getElementById('authBtn').onclick = async () => {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value;
        const isRegister = document.getElementById('authBtn').innerText === 'Register';
        
        await loadUsersFromTelegram();
        
        if (isRegister) {
            if (users.find(u => u.username === username)) return alert('Username sudah ada');
            await registerToTelegram(username, password);
            alert('Registrasi berhasil! Silakan login');
            document.getElementById('authBtn').innerText = 'Login';
            document.getElementById('switchAuth').innerText = 'Register';
        } else {
            const user = users.find(u => u.username === username && u.password === password);
            if (!user) return alert('Username atau password salah');
            currentUser = username;
            localStorage.setItem('yanto_user', username);
            document.getElementById('authView').classList.add('hide');
            document.getElementById('mainView').classList.remove('hide');
            loadMessages();
            setInterval(loadMessages, 3000);
        }
    };
    
    document.getElementById('switchAuth').onclick = () => {
        const btn = document.getElementById('authBtn');
        const isLogin = btn.innerText === 'Login';
        btn.innerText = isLogin ? 'Register' : 'Login';
        document.getElementById('switchAuth').innerText = isLogin ? 'Register' : 'Sudah punya akun? Login';
    };
    
    async function loadMessages() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT2_TOKEN}/getUpdates?limit=100`);
            const data = await res.json();
            if (data.ok) {
                const msgs = [];
                for (const update of data.result) {
                    const msg = update.message;
                    if (msg && msg.text && !msg.text.startsWith('REGISTER:')) {
                        const text = msg.text;
                        const timestamp = msg.date;
                        let fromUser = null;
                        let content = text;
                        let targetUser = null;
                        const fromMatch = text.match(/^([a-zA-Z0-9]+):\s*(.*)$/);
                        if (fromMatch) {
                            fromUser = fromMatch[1];
                            content = fromMatch[2];
                        }
                        const toMatch = content.match(/- to \(([^)]+)\)/);
                        if (toMatch) {
                            targetUser = toMatch[1];
                            content = content.replace(/- to \([^)]+\)/, '').trim();
                        }
                        if (fromUser) {
                            msgs.push({ from: fromUser, to: targetUser, message: content, timestamp });
                        }
                    }
                }
                allMessages = msgs;
                renderChatList();
                if (currentChatWith) renderMessages();
            }
        } catch(e) { console.error(e); }
    }
    
    function getChats() {
        const chats = new Map();
        for (const msg of allMessages) {
            if (msg.from === currentUser && msg.to) chats.set(msg.to, { username: msg.to, lastMessage: msg.message, lastTime: msg.timestamp });
            if (msg.to === currentUser && msg.from) chats.set(msg.from, { username: msg.from, lastMessage: msg.message, lastTime: msg.timestamp });
        }
        return Array.from(chats.values()).sort((a,b) => b.lastTime - a.lastTime);
    }
    
    function renderChatList() {
        const chats = getChats();
        const container = document.getElementById('chatList');
        if (!container) return;
        container.innerHTML = chats.map(chat => `
            <div class="chat-item" onclick="openChat('${chat.username}')">
                <div class="avatar">${chat.username.charAt(0).toUpperCase()}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.username)}</div>
                    <div class="chat-preview">${escapeHtml(chat.lastMessage.substring(0, 30))}</div>
                </div>
            </div>
        `).join('');
        if (chats.length === 0) container.innerHTML = '<div style="padding:20px; text-align:center; color:#8b9bb0;">Belum ada chat. Klik + untuk cari teman</div>';
    }
    
    function openChat(username) {
        if (username === currentUser) return alert('Tidak bisa chat dengan diri sendiri');
        currentChatWith = username;
        document.getElementById('chatListView').style.display = 'none';
        document.getElementById('chatDetailView').style.display = 'flex';
        document.getElementById('detailUsername').innerText = username;
        renderMessages();
    }
    
    function backToList() {
        currentChatWith = null;
        document.getElementById('chatListView').style.display = 'flex';
        document.getElementById('chatDetailView').style.display = 'none';
    }
    
    function renderMessages() {
        if (!currentChatWith) return;
        const msgs = allMessages.filter(m => 
            (m.from === currentUser && m.to === currentChatWith) ||
            (m.from === currentChatWith && m.to === currentUser)
        );
        const container = document.getElementById('messagesArea');
        if (msgs.length === 0) {
            container.innerHTML = '<div style="padding:20px; text-align:center; color:#8b9bb0;">Belum ada pesan</div>';
            return;
        }
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.from === currentUser ? 'outgoing' : 'incoming'}">
                ${msg.from !== currentUser ? `<div class="sender">${escapeHtml(msg.from)}</div>` : ''}
                ${escapeHtml(msg.messa
