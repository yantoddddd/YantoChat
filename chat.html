<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YantoChat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #17212b; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .app { width: 100%; max-width: 450px; height: 100vh; background: #17212b; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #17212b; padding: 12px 16px; border-bottom: 1px solid #2b3b4a; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; color: #fff; }
        .header-buttons { display: flex; gap: 8px; }
        .add-btn, .profile-btn { background: #6ab04c; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 1.2rem; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #2b3b4a; cursor: pointer; }
        .avatar { width: 48px; height: 48px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; margin-right: 12px; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; color: #fff; }
        .chat-preview { font-size: 0.8rem; color: #8b9bb0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-detail { display: none; flex-direction: column; height: 100%; }
        .chat-detail-header { background: #17212b; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2b3b4a; }
        .back-btn { background: none; border: none; color: #6ab04c; font-size: 1.2rem; cursor: pointer; }
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 0.9rem; word-break: break-word; }
        .message.outgoing { background: #2b5270; color: white; align-self: flex-end; }
        .message.incoming { background: #1e2a36; color: #fff; align-self: flex-start; }
        .message .sender { font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; }
        .input-area { background: #17212b; padding: 12px; display: flex; gap: 8px; border-top: 1px solid #2b3b4a; }
        .input-area input { flex: 1; padding: 10px; border: none; border-radius: 20px; background: #2b3b4a; color: white; font-size: 0.9rem; }
        .input-area input:focus { outline: none; }
        .input-area button { background: #6ab04c; border: none; padding: 10px 20px; border-radius: 20px; color: white; cursor: pointer; font-weight: 600; }
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100%; padding: 20px; }
        .auth-card { background: #242f3e; border-radius: 16px; padding: 24px; width: 100%; max-width: 320px; }
        .auth-card h2 { color: white; margin-bottom: 20px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 12px; border: none; border-radius: 8px; background: #1e2a36; color: white; font-size: 0.9rem; }
        .auth-card button { width: 100%; padding: 12px; background: #6ab04c; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; }
        .switch { text-align: center; margin-top: 12px; color: #6ab04c; cursor: pointer; font-size: 0.9rem; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #242f3e; border-radius: 16px; padding: 24px; width: 85%; max-width: 350px; }
        .modal-content h3 { color: white; margin-bottom: 16px; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 12px; border: none; border-radius: 8px; background: #1e2a36; color: white; font-size: 0.9rem; }
        .modal-content button { width: 100%; padding: 12px; background: #6ab04c; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 600; margin-bottom: 8px; }
        .close-modal-btn { background: #dc2626; margin-top: 8px; }
        .hide { display: none; }
        .error { color: #ef4444; text-align: center; margin-top: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div id="authView" class="auth-container">
        <div class="auth-card">
            <h2>YantoChat</h2>
            <input type="text" id="authUsername" placeholder="Username">
            <input type="password" id="authPassword" placeholder="Password">
            <button id="authBtn">Login</button>
            <div class="switch" id="switchAuth">Register</div>
        </div>
    </div>
    <div id="mainView" style="display:none; flex-direction:column; height:100%;">
        <div id="chatListView" style="display:flex; flex-direction:column; height:100%;">
            <div class="header">
                <h1>YantoChat</h1>
                <div class="header-buttons">
                    <button class="add-btn" onclick="showSearchModal()">+</button>
                    <button class="profile-btn" onclick="showProfileModal()">👤</button>
                </div>
            </div>
            <div id="chatList" class="chat-list"></div>
        </div>
        <div id="chatDetailView" class="chat-detail">
            <div class="chat-detail-header">
                <button class="back-btn" onclick="backToList()">←</button>
                <div><span style="font-weight:600; color:white;" id="detailUsername"></span></div>
            </div>
            <div id="messagesArea" class="messages-area"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Ketik pesan...">
                <button onclick="sendMsg()">Kirim</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Konfigurasi
    const BOT1_TOKEN = '8606015215:AAF0ECEhBqchYwOlgGuwRQD9ggJvhKVYszU';
    const BOT2_TOKEN = '8696412856:AAFHHyzynN0k_hCNj8F4mR8QBfbNPFxiUDk';
    const CHAT_ID = '-1002806265297';
    
    let currentUser = null;
    let currentChatWith = null;
    let allMessages = [];
    let users = [];
    
    async function sendToTelegram(text) {
        await fetch(`https://api.telegram.org/bot${BOT1_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text })
        });
    }
    
    async function deleteUserFromTelegram(username) {
        await sendToTelegram(`DELETE:${username}`);
    }
    
    async function registerToTelegram(username, password) {
        await sendToTelegram(`REGISTER:${username}:${password}`);
    }
    
    function showProfileModal() {
        let modal = document.querySelector('#profileModal');
        if (modal) modal.remove();
        
        modal = document.createElement('div');
        modal.id = 'profileModal';
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Profile - ${escapeHtml(currentUser)}</h3>
                <input type="password" id="oldPassword" placeholder="Password Lama">
                <input type="password" id="newPassword" placeholder="Password Baru">
                <div id="profileError" class="error"></div>
                <button onclick="changePassword()">Ubah Password</button>
                <button class="close-modal-btn" onclick="logout()">Logout</button>
                <button class="close-modal-btn" onclick="this.parentElement.parentElement.remove()">Tutup</button>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    async function changePassword() {
        const oldPassword = document.querySelector('#oldPassword')?.value.trim();
        const newPassword = document.querySelector('#newPassword')?.value.trim();
        const errorDiv = document.querySelector('#profileError');
        
        if (!oldPassword || !newPassword) {
            errorDiv.textContent = 'Masukkan password lama dan baru!';
            return;
        }
        
        // Validasi password lama
        const user = users.find(u => u.username === currentUser);
        if (!user || user.password !== oldPassword) {
            errorDiv.textContent = 'Password lama salah!';
            return;
        }
        
        if (newPassword.length < 3) {
            errorDiv.textContent = 'Password baru minimal 3 karakter!';
            return;
        }
        
        errorDiv.textContent = '';
        
        try {
            // 1. Hapus akun lama di Telegram
            await deleteUserFromTelegram(currentUser);
            
            // 2. Daftarkan ulang dengan password baru
            await registerToTelegram(currentUser, newPassword);
            
            // 3. Update localStorage
            const userIndex = users.findIndex(u => u.username === currentUser);
            if (userIndex !== -1) {
                users[userIndex].password = newPassword;
                localStorage.setItem('users', JSON.stringify(users));
            }
            
            alert('Password berhasil diubah! Silakan login ulang.');
            logout();
            
        } catch (err) {
            errorDiv.textContent = 'Gagal mengubah password. Coba lagi.';
            console.error(err);
        }
    }
    
    function logout() {
        localStorage.removeItem('yanto_user');
        currentUser = null;
        currentChatWith = null;
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('authView').style.display = 'flex';
        document.getElementById('authUsername').value = '';
        document.getElementById('authPassword').value = '';
        document.getElementById('authBtn').innerText = 'Login';
        document.getElementById('switchAuth').innerText = 'Register';
    }
    
    function checkSession() {
        const savedUser = localStorage.getItem('yanto_user');
        if (savedUser) {
            currentUser = savedUser;
            document.getElementById('authView').style.display = 'none';
            document.getElementById('mainView').style.display = 'flex';
            loadMessages();
            setInterval(loadMessages, 3000);
        }
    }
    
    async function loadUsersFromTelegram() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT2_TOKEN}/getUpdates?limit=200`);
            const data = await res.json();
            if (data.ok) {
                const userMap = new Map();
                for (const update of data.result) {
                    const msg = update.message;
                    if (msg && msg.text && msg.text.startsWith('REGISTER:')) {
                        const parts = msg.text.replace('REGISTER:', '').trim().split(':');
                        if (parts.length >= 2) {
                            userMap.set(parts[0], parts[1]);
                        }
                    }
                }
                users = Array.from(userMap.entries()).map(([u, p]) => ({ username: u, password: p }));
                console.log('Users loaded:', users);
            }
        } catch(e) { console.error(e); }
    }
    
    document.getElementById('authBtn').onclick = async () => {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value;
        const isRegister = document.getElementById('authBtn').innerText === 'Register';
        
        await loadUsersFromTelegram();
        
        if (isRegister) {
            if (users.find(u => u.username === username)) return alert('Username sudah ada');
            await registerToTelegram(username, password);
            users.push({ username, password });
            alert('Registrasi berhasil! Silakan login');
            document.getElementById('authBtn').innerText = 'Login';
            document.getElementById('switchAuth').innerText = 'Register';
        } else {
            const user = users.find(u => u.username === username && u.password === password);
            if (!user) return alert('Username atau password salah');
            currentUser = username;
            localStorage.setItem('yanto_user', username);
            document.getElementById('authView').style.display = 'none';
            document.getElementById('mainView').style.display = 'flex';
            loadMessages();
            setInterval(loadMessages, 3000);
        }
    };
    
    document.getElementById('switchAuth').onclick = () => {
        const btn = document.getElementById('authBtn');
        const isLogin = btn.innerText === 'Login';
        btn.innerText = isLogin ? 'Register' : 'Login';
        document.getElementById('switchAuth').innerText = isLogin ? 'Register' : 'Sudah punya akun? Login';
    };
    
    async function loadMessages() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT2_TOKEN}/getUpdates?limit=100`);
            const data = await res.json();
            if (data.ok) {
                const msgs = [];
                for (const update of data.result) {
                    const msg = update.message;
                    if (msg && msg.text && !msg.text.startsWith('REGISTER:') && !msg.text.startsWith('DELETE:')) {
                        const text = msg.text;
                        const timestamp = msg.date;
                        let fromUser = null;
                        let content = text;
                        let targetUser = null;
                        const fromMatch = text.match(/^([a-zA-Z0-9]+):\s*(.*)$/);
                        if (fromMatch) {
                            fromUser = fromMatch[1];
                            content = fromMatch[2];
                        }
                        const toMatch = content.match(/- to \(([^)]+)\)/);
                        if (toMatch) {
                            targetUser = toMatch[1];
                            content = content.replace(/- to \([^)]+\)/, '').trim();
                        }
                        if (fromUser) {
                            msgs.push({ from: fromUser, to: targetUser, message: content, timestamp });
                        }
                    }
                }
                allMessages = msgs;
                renderChatList();
                if (currentChatWith) renderMessages();
            }
        } catch(e) { console.error(e); }
    }
    
    function getChats() {
        const chats = new Map();
        for (const msg of allMessages) {
            if (msg.from === currentUser && msg.to) chats.set(msg.to, { username: msg.to, lastMessage: msg.message, lastTime: msg.timestamp });
            if (msg.to === currentUser && msg.from) chats.set(msg.from, { username: msg.from, lastMessage: msg.message, lastTime: msg.timestamp });
        }
        return Array.from(chats.values()).sort((a,b) => b.lastTime - a.lastTime);
    }
    
    function renderChatList() {
        const chats = getChats();
        const container = document.getElementById('chatList');
        if (!container) return;
        container.innerHTML = chats.map(chat => `
            <div class="chat-item" onclick="openChat('${chat.username}')">
                <div class="avatar">${chat.username.charAt(0).toUpperCase()}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.username)}</div>
                    <div class="chat-preview">${escapeHtml(chat.lastMessage.substring(0, 30))}</div>
                </div>
            </div>
        `).join('');
        if (chats.length === 0) container.innerHTML = '<div style="padding:20px; text-align:center; color:#8b9bb0;">Belum ada chat. Klik + untuk cari teman</div>';
    }
    
    function openChat(username) {
        if (username === currentUser) return alert('Tidak bisa chat dengan diri sendiri');
        currentChatWith = username;
        document.getElementById('chatListView').style.display = 'none';
        document.getElementById('chatDetailView').style.display = 'flex';
        document.getElementById('detailUsername').innerText = username;
        renderMessages();
    }
    
    function backToList() {
        currentChatWith = null;
        document.getElementById('chatListView').style.display = 'flex';
        document.getElementById('chatDetailView').style.display = 'none';
    }
    
    function renderMessages() {
        if (!currentChatWith) return;
        const msgs = allMessages.filter(m => 
            (m.from === currentUser && m.to === currentChatWith) ||
            (m.from === currentChatWith && m.to === currentUser)
        );
        const container = document.getElementById('messagesArea');
        if (msgs.length === 0) {
            container.innerHTML = '<div style="padding:20px; text-align:center; color:#8b9bb0;">Belum ada pesan</div>';
            return;
        }
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.from === currentUser ? 'outgoing' : 'incoming'}">
                ${msg.from !== currentUser ? `<div class="sender">${escapeHtml(msg.from)}</div>` : ''}
                ${escapeHtml(msg.message)}
                <div class="message-time">${new Date(msg.timestamp * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    async function sendMsg() {
        const msg = document.getElementById('messageInput').value.trim();
        if (!msg) return;
        const formatted = `${currentUser}: ${msg} - to (${currentChatWith})`;
        await fetch(`https://api.telegram.org/bot${BOT1_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: formatted })
        });
        document.getElementById('messageInput').value = '';
        await loadMessages();
    }
    
    function showSearchModal() {
        let modal = document.querySelector('#searchModal');
        if (modal) modal.remove();
        modal = document.createElement('div');
        modal.id = 'searchModal';
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Cari Pengguna</h3>
                <input type="text" id="searchUserInput" placeholder="Username">
                <button onclick="searchAndChat()">Chat</button>
                <button class="close-modal-btn" onclick="this.parentElement.parentElement.remove()">Batal</button>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    async function searchAndChat() {
        const searchInput = document.querySelector('#searchUserInput');
        const targetUser = searchInput.value.trim();
        if (!targetUser) return alert('Masukkan username');
        if (targetUser === currentUser) return alert('Tidak bisa chat dengan diri sendiri');
        await loadUsersFromTelegram();
        const userExists = users.find(u => u.username === targetUser);
        if (!userExists) return alert(`User "${targetUser}" tidak ditemukan`);
        document.querySelector('#searchModal').remove();
        openChat(targetUser);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    // Attach global functions
    window
